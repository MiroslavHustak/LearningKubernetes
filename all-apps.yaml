---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canopy-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: canopy-api

  template:
    metadata:
      labels:
        app: canopy-api

    spec:
      containers:
        - name: canopy-api

          image: canopy-api:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 80

          env:
            - name: API_KEY
              value: test747646s5d4fvasfd645654asgasga654a6g13a2fg465a4fg4a3

---
apiVersion: v1
kind: Service
metadata:
  name: canopy-api

spec:
  type: NodePort

  selector:
    app: canopy-api

  ports:
    - port: 80
      targetPort: 80


---
apiVersion: batch/v1
kind: Job
metadata:
  name: canopy-scraper

spec:
  template:
    spec:
      containers:
        - name: canopy-scraper

          image: canopy-scraper:latest

          imagePullPolicy: Never

          env:
            - name: API_BASE_URL
              value: http://canopy-api

      restartPolicy: Never

  backoffLimit: 2

---
apiVersion: batch/v1
kind: Job
metadata:
  name: excel-json-xml-to-db

spec:
  template:
    spec:
      containers:
        - name: excel-json-xml-to-db

          image: excel-json_xml_to_db:latest

          imagePullPolicy: Never

      restartPolicy: Never

  backoffLimit: 2
