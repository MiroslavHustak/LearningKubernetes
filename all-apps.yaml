---
apiVersion: v1
kind: ConfigMap
metadata:
  name: canopy-config
data:
  API_BASE_URL: http://canopy-api
  INTERACTIVE: "false"

---
apiVersion: v1
kind: Secret
metadata:
  name: canopy-secret
type: Opaque
stringData:
  API_KEY: test747646s5d4fvasfd645654asgasga654a6g13a2fg465a4fg4a3

# --- Canopy storage ---

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: canopy-data-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "C:/Users/Mira/data"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: canopy-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

# --- excel-json-xml-to-db storage ---

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: excel-json-xml-to-db-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "C:/Users/Mira/excel-json-xml-to-db-data"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: excel-json-xml-to-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

# --- Deployment ---

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canopy-api

spec:
  replicas: 3

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: canopy-api

  template:
    metadata:
      labels:
        app: canopy-api

    spec:
      initContainers:
        - name: create-data-folders
          image: busybox
          command:
            - sh
            - -c
            - |
              mkdir -p /data/CanopyResults /data/jsonLinks /data/logging
          volumeMounts:
            - name: canopy-storage
              mountPath: /data

      containers:
        - name: canopy-api
          image: canopy-api:v3
          imagePullPolicy: Never

          ports:
            - containerPort: 80

          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: canopy-secret
                  key: API_KEY

            - name: APP_DATA_PATH
              value: /data

          volumeMounts:
            - name: canopy-storage
              mountPath: /data

          #readinessProbe:
            #httpGet:
            #  path: /health
              #port: 80
            #initialDelaySeconds: 5
            #periodSeconds: 5
            #failureThreshold: 3

          #livenessProbe:
            #httpGet:
              #path: /health
              #port: 80
            #initialDelaySeconds: 10
            #periodSeconds: 10
            #failureThreshold: 3

      volumes:
        - name: canopy-storage
          persistentVolumeClaim:
            claimName: canopy-data-pvc

# --- Service ---

---
apiVersion: v1
kind: Service
metadata:
  name: canopy-api

spec:
  type: NodePort

  selector:
    app: canopy-api

  ports:
    - port: 80
      targetPort: 80

# --- CronJob ---

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: canopy-scraper

spec:
  schedule: "0 22 * * *"

  concurrencyPolicy: Forbid

  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  startingDeadlineSeconds: 86400

  jobTemplate:
    spec:
      backoffLimit: 2

      template:
        spec:

          initContainers:
            - name: create-data-folders
              image: busybox
              command:
                - sh
                - -c
                - |
                  mkdir -p /data/CanopyResults /data/jsonLinks /data/logging
              volumeMounts:
                - name: canopy-storage
                  mountPath: /data

          containers:
            - name: canopy-scraper
              image: canopy-scraper:latest
              imagePullPolicy: Never

              env:
                - name: API_BASE_URL
                  valueFrom:
                    configMapKeyRef:
                      name: canopy-config
                      key: API_BASE_URL

                - name: INTERACTIVE
                  valueFrom:
                    configMapKeyRef:
                      name: canopy-config
                      key: INTERACTIVE

                - name: APP_DATA_PATH
                  value: /data

              volumeMounts:
                - name: canopy-storage
                  mountPath: /data

          restartPolicy: Never

          volumes:
            - name: canopy-storage
              persistentVolumeClaim:
                claimName: canopy-data-pvc

# --- Job ---

---
apiVersion: batch/v1
kind: Job
metadata:
  name: excel-json-xml-to-db

spec:
  backoffLimit: 2

  template:
    spec:

      containers:
        - name: excel-json-xml-to-db
          image: excel-json_xml_to_db:latest
          imagePullPolicy: Never

          volumeMounts:
            - name: excel-json-xml-to-db-storage
              mountPath: /data

      restartPolicy: Never

      volumes:
        - name: excel-json-xml-to-db-storage
          persistentVolumeClaim:
            claimName: excel-json-xml-to-db-pvc
